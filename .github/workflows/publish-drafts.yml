name: Publish scheduled blog posts

on:
  schedule:
    # Runs daily at 9:00 AM UTC (2:00 AM PT / 5:00 AM ET)
    - cron: '0 9 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  publish:
    # Only run on the production repo. Without this guard, the workflow fires
    # independently on origin (fork) and production, creating divergent commit
    # SHAs with identical content and forcing a cherry-pick pattern on any
    # same-day manual push. See CLAUDE.md > Blog system.
    if: github.repository == 'blackbox-engineering/flextram_landing'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Publish drafts whose date has arrived
        run: |
          TODAY=$(date -u +%Y-%m-%d)
          PUBLISHED=0
          # Capture published URLs for IndexNow submission (one per line).
          PUBLISHED_URLS_FILE=/tmp/published_urls.txt
          : > "$PUBLISHED_URLS_FILE"

          echo "Today is $TODAY"
          echo "Checking blog/_drafts/ for publishable articles..."

          for draft in blog/_drafts/*.html; do
            [ -f "$draft" ] || continue

            # Extract date from filename: YYYY-MM-DD_slug.html
            FILENAME=$(basename "$draft")
            PUB_DATE=$(echo "$FILENAME" | grep -oP '^\d{4}-\d{2}-\d{2}')

            if [ -z "$PUB_DATE" ]; then
              echo "SKIP: $FILENAME (no date prefix found)"
              continue
            fi

            if [[ ! "$PUB_DATE" > "$TODAY" ]]; then
              # Extract slug (everything after the date and underscore)
              SLUG=$(echo "$FILENAME" | sed "s/^${PUB_DATE}_//")
              SLUG_NO_EXT=$(echo "$SLUG" | sed 's/.html$//')
              DEST="blog/$SLUG"

              echo "PUBLISH: $FILENAME -> $DEST (scheduled for $PUB_DATE)"

              # Parse BLOG_META from HTML comment block
              META_TITLE=$(sed -n 's/^title: //p' "$draft" | head -1)
              META_EXCERPT=$(sed -n 's/^excerpt: //p' "$draft" | head -1)
              META_CATEGORY=$(sed -n 's/^category: //p' "$draft" | head -1)
              META_DATE_DISPLAY=$(sed -n 's/^date_display: //p' "$draft" | head -1)
              META_IMAGE=$(sed -n 's/^image: //p' "$draft" | head -1)
              META_IMAGE_ALT=$(sed -n 's/^image_alt: //p' "$draft" | head -1)

              # Move draft to live
              mv "$draft" "$DEST"

              # Record URL for IndexNow submission step
              echo "https://www.flextram.com/blog/${SLUG_NO_EXT}" >> "$PUBLISHED_URLS_FILE"

              # Build optional <image:image> block for sitemap (image-sitemap
              # extension declared via xmlns:image in the urlset header).
              # Transforms BLOG_META image path "../assets/img/foo.jpg" → absolute URL,
              # and XML-escapes any & characters in the alt text.
              # Falls back to no image block if BLOG_META lacks image fields.
              if [ -n "$META_IMAGE" ] && [ -n "$META_IMAGE_ALT" ]; then
                IMAGE_URL=$(echo "$META_IMAGE" | sed 's|^\.\./|https://www.flextram.com/|')
                IMAGE_ALT_XML=$(echo "$META_IMAGE_ALT" | sed 's|&|\&amp;|g')
                IMAGE_BLOCK="\n    <image:image>\n      <image:loc>${IMAGE_URL}</image:loc>\n      <image:caption>${IMAGE_ALT_XML}</image:caption>\n    </image:image>"
                echo "  Including image-sitemap entry: $IMAGE_URL"
              else
                IMAGE_BLOCK=""
                echo "  WARNING: No image in BLOG_META, sitemap entry will lack image:image block"
              fi

              # Add to sitemap (with image:image block if available)
              sed -i "/<\/urlset>/i\\  <url>\n    <loc>https://www.flextram.com/blog/${SLUG_NO_EXT}</loc>\n    <lastmod>${TODAY}</lastmod>\n    <changefreq>monthly</changefreq>\n    <priority>0.7</priority>${IMAGE_BLOCK}\n  </url>" sitemap.xml

              # Add card to blog hub page (before the NEW-ARTICLES-ABOVE marker)
              if [ -n "$META_TITLE" ]; then
                CARD_HTML="      <a href=\"/blog/${SLUG_NO_EXT}\" class=\"blog-card\">\n        <img class=\"blog-card-img\" loading=\"lazy\" src=\"${META_IMAGE}\" alt=\"${META_IMAGE_ALT}\">\n        <div class=\"blog-card-body\">\n          <div class=\"blog-card-meta\">${META_DATE_DISPLAY} \\&middot; ${META_CATEGORY}</div>\n          <div class=\"blog-card-title\">${META_TITLE}</div>\n          <div class=\"blog-card-excerpt\">${META_EXCERPT}</div>\n        </div>\n      </a>\n"
                sed -i "/<!-- NEW-ARTICLES-ABOVE -->/i\\${CARD_HTML}" blog/index.html
                echo "  Added hub card for: $META_TITLE"
              else
                echo "  WARNING: No BLOG_META found, skipping hub card"
              fi

              PUBLISHED=$((PUBLISHED + 1))
            else
              echo "WAIT: $FILENAME (scheduled for $PUB_DATE, not yet)"
            fi
          done

          echo "Published $PUBLISHED article(s)"
          echo "PUBLISHED=$PUBLISHED" >> $GITHUB_ENV

      - name: Commit and push
        if: env.PUBLISHED != '0'
        run: |
          git config user.name "FlexTram Bot"
          git config user.email "noreply@flextram.com"
          git add blog/ sitemap.xml
          git commit -m "Publish ${{ env.PUBLISHED }} scheduled blog post(s) [automated]"
          git push

      - name: Notify IndexNow (Bing / DuckDuckGo / Yandex / Seznam)
        if: env.PUBLISHED != '0'
        # Submits each newly-published URL to IndexNow so Bing-family search
        # engines (and DuckDuckGo, which uses Bing as primary index) recrawl
        # within hours instead of waiting on organic discovery. Failures are
        # non-fatal — the workflow still succeeds even if IndexNow rejects.
        # Key file lives at /3b5dd366e4db30dd7e6249ecda05e4c4.txt (public by
        # design — IndexNow keys are verification tokens, not credentials).
        continue-on-error: true
        run: |
          KEY="3b5dd366e4db30dd7e6249ecda05e4c4"
          KEY_LOCATION="https://www.flextram.com/${KEY}.txt"
          PUBLISHED_URLS_FILE=/tmp/published_urls.txt

          if [ ! -s "$PUBLISHED_URLS_FILE" ]; then
            echo "No URLs captured for IndexNow submission, skipping."
            exit 0
          fi

          echo "Submitting these URLs to IndexNow:"
          cat "$PUBLISHED_URLS_FILE"

          # Build JSON urlList array from the file using jq's -R/-s/-c.
          URL_LIST_JSON=$(jq -R -s -c 'split("\n") | map(select(length > 0))' "$PUBLISHED_URLS_FILE")

          BODY=$(jq -n \
            --arg host "www.flextram.com" \
            --arg key "$KEY" \
            --arg keyLoc "$KEY_LOCATION" \
            --argjson urls "$URL_LIST_JSON" \
            '{host: $host, key: $key, keyLocation: $keyLoc, urlList: $urls}')

          echo "Request body:"
          echo "$BODY"

          HTTP_CODE=$(curl -s -o /tmp/indexnow_resp.txt -w "%{http_code}" \
            -X POST "https://api.indexnow.org/indexnow" \
            -H "Content-Type: application/json; charset=utf-8" \
            -d "$BODY")

          echo "IndexNow response: HTTP $HTTP_CODE"
          cat /tmp/indexnow_resp.txt 2>/dev/null || true

          # IndexNow success = 200 or 202; anything else is a soft failure
          # (we don't want to fail the publish for a search-engine ping).
          if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "202" ]; then
            echo "IndexNow accepted submission."
          else
            echo "IndexNow returned non-success status, but workflow continues."
          fi
