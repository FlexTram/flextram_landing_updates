<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page Not Found — FlexTram Systems</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=Instrument+Serif:ital@0;1&display=swap" onload="this.onload=null;this.rel='stylesheet'" />
  <noscript><link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet" /></noscript>
  <link rel="icon" type="image/png" href="/assets/img/favicon.png">
  <link rel="stylesheet" href="/assets/css/global.css" />
  <style>
    .error-page {
      max-width: 600px;
      margin: 0 auto;
      padding: 3rem var(--page-padding) 4rem;
      text-align: center;
    }
    .error-graphic {
      max-width: 100%;
      height: auto;
      margin-bottom: 2rem;
    }
    .error-heading {
      font-family: var(--font-serif);
      font-size: 32px;
      font-weight: 400;
      color: var(--color-text-primary);
      margin-bottom: 0.75rem;
    }
    .error-desc {
      font-size: 14px;
      color: var(--color-text-secondary);
      line-height: 1.6;
      margin-bottom: 2rem;
    }
    .error-links {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
    }
  </style>
</head>
<body>

  <nav class="nav">
    <a href="/" class="nav-logo"><img src="/assets/img/logo_black_new.png" alt="FlexTram" width="147" height="30" style="height: 30px;"></a>
    <div class="nav-links">
      <a href="/solutions/" class="nav-link">Solutions</a>
      <a href="/blog/" class="nav-link">Blog</a>
      <a href="/#contact-form" class="nav-cta">Check Availability</a>
    </div>
  </nav>

  <main class="error-page">
    <img src="/assets/img/404graphic.svg" alt="FlexTram 404 illustration" class="error-graphic">
    <h1 class="error-heading">End of The Line</h1>
    <p class="error-desc">The page you're looking for doesn't exist or has been moved. Here are some places to start:</p>
    <div class="error-links">
      <a href="/" class="btn-primary">Home</a>
      <a href="/solutions/" class="btn-secondary">Solutions</a>
      <a href="/#contact-form" class="btn-secondary">Contact</a>
    </div>
  </main>

</body>
</html>
